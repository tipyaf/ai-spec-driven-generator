# ============================================================================
# EXAMPLE: Todo App — Fullstack task management application
# ============================================================================

project:
  name: "todo-app"
  description: "Fullstack task management application with authentication"
  type: "fullstack"
  language: "typescript"
  version: "0.1.0"

stack:
  runtime: "bun"
  framework: "nextjs"
  database: "postgres"
  orm: "prisma"
  auth: "nextauth"
  styling: "tailwind"
  testing: "vitest"
  linting: "biome"
  package_manager: "bun"

architecture:
  pattern: "layered"
  monorepo: false

features:
  - name: "auth"
    description: "User registration and login"
    priority: "must-have"

    acceptance_criteria:
      - id: "AC-FUNC-AUTH-01"
        type: "FUNC"
        description: "Given a valid email and password / When user submits registration / Then account is created and user is redirected to dashboard"
        verify: "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/register -H 'Content-Type: application/json' -d '{\"email\":\"test@example.com\",\"password\":\"Test1234!\"}'"
        tier: 2

      - id: "AC-FUNC-AUTH-02"
        type: "FUNC"
        description: "Given a registered user / When user submits login with correct credentials / Then session is created and user is redirected to dashboard"
        verify: "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/callback/credentials -H 'Content-Type: application/json' -d '{\"email\":\"test@example.com\",\"password\":\"Test1234!\"}'"
        tier: 2

      - id: "AC-FUNC-AUTH-03"
        type: "FUNC"
        description: "Given an unauthenticated user / When user navigates to a protected route / Then user is redirected to /login"
        verify: "curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/dashboard"
        tier: 2

      - id: "AC-FUNC-AUTH-04"
        type: "FUNC"
        description: "Given an authenticated user / When user clicks logout / Then session is destroyed"
        verify: "grep -r 'signOut' src/components/"
        tier: 1

      # Security ACs — auto-generated from stack profile during /refine
      - id: "AC-SEC-AUTH-01"
        type: "SEC"
        description: "Passwords are hashed with bcrypt before storage"
        verify: "grep -r 'bcrypt\\|argon2' src/lib/auth"
        tier: 1

      - id: "AC-SEC-AUTH-02"
        type: "SEC"
        description: "No secrets or API keys hardcoded in source files"
        verify: "bash -c '! grep -rn \"password\\s*=\\s*[\\x27\\\"]\" src/ --include=\"*.ts\" --include=\"*.tsx\" | grep -v test | grep -v \\.env'"
        tier: 1

      # Best practice ACs — auto-generated from stack profile during /refine
      - id: "AC-BP-AUTH-01"
        type: "BP"
        description: "All API routes use NextAuth session validation"
        verify: "grep -r 'getServerSession\\|getSession' src/app/api/"
        tier: 1

  - name: "todos-crud"
    description: "Create, read, update, and delete tasks"
    priority: "must-have"

    acceptance_criteria:
      - id: "AC-FUNC-TODOS-01"
        type: "FUNC"
        description: "Given a logged-in user / When user submits a new task with a title / Then task is created and appears in the list"
        verify: "curl -s -w '%{http_code}' -X POST http://localhost:3000/api/todos -H 'Content-Type: application/json' -d '{\"title\":\"Test task\"}'"
        tier: 2

      - id: "AC-FUNC-TODOS-02"
        type: "FUNC"
        description: "Given a logged-in user with tasks / When user loads the dashboard / Then only their own tasks are displayed"
        verify: "grep -r 'userId\\|session.user' src/app/api/todos/"
        tier: 1

      - id: "AC-FUNC-TODOS-03"
        type: "FUNC"
        description: "Given a task / When user clicks the checkbox / Then task completed status is toggled"
        verify: "grep -r 'completed.*toggle\\|!completed\\|completed:.*!prev' src/"
        tier: 1

      - id: "AC-FUNC-TODOS-04"
        type: "FUNC"
        description: "Given a task / When user clicks delete / Then task is removed from database and UI"
        verify: "curl -s -o /dev/null -w '%{http_code}' -X DELETE http://localhost:3000/api/todos/test-id"
        tier: 2

      - id: "AC-SEC-TODOS-01"
        type: "SEC"
        description: "API validates that user owns the todo before mutation"
        verify: "grep -r 'userId.*session\\|where.*userId' src/app/api/todos/"
        tier: 1

      - id: "AC-BP-TODOS-01"
        type: "BP"
        description: "All database queries use Prisma ORM — no raw SQL"
        verify: "bash -c '! grep -rn \"\\$queryRaw\\|\\$executeRaw\" src/app/api/todos/'"
        tier: 1

  - name: "todo-filters"
    description: "Filter tasks by status"
    priority: "should-have"

    acceptance_criteria:
      - id: "AC-FUNC-FILTERS-01"
        type: "FUNC"
        description: "Given a task list / When user clicks 'Active' filter / Then only incomplete tasks are shown"
        verify: "grep -r 'filter.*active\\|completed.*false' src/components/"
        tier: 1

      - id: "AC-FUNC-FILTERS-02"
        type: "FUNC"
        description: "Given a task list / When user clicks 'Completed' filter / Then only completed tasks are shown"
        verify: "grep -r 'filter.*completed\\|completed.*true' src/components/"
        tier: 1

      - id: "AC-FUNC-FILTERS-03"
        type: "FUNC"
        description: "Given a task list / When viewing any filter / Then remaining task count is displayed"
        verify: "grep -r 'count\\|remaining\\|length' src/components/TodoFilters"
        tier: 1

data_model:
  entities:
    - name: "User"
      fields:
        - name: "id"
          type: "string"
          required: true
          unique: true
          description: "Auto-generated UUID"
        - name: "email"
          type: "string"
          required: true
          unique: true
          description: "User's email"
        - name: "passwordHash"
          type: "string"
          required: true
          description: "Bcrypt password hash"
        - name: "name"
          type: "string"
          required: false
          description: "Display name"
        - name: "createdAt"
          type: "date"
          required: true
          description: "Creation date"
      relations:
        - type: "one-to-many"
          target: "Todo"
          field: "todos"

    - name: "Todo"
      fields:
        - name: "id"
          type: "string"
          required: true
          unique: true
          description: "Auto-generated UUID"
        - name: "title"
          type: "string"
          required: true
          description: "Task title"
        - name: "completed"
          type: "boolean"
          required: true
          description: "Completion status"
        - name: "createdAt"
          type: "date"
          required: true
          description: "Creation date"
        - name: "updatedAt"
          type: "date"
          required: true
          description: "Last modification date"
      relations:
        - type: "many-to-one"
          target: "User"
          field: "userId"

non_functional:
  performance:
    - "API response time < 200ms"
    - "First Contentful Paint < 1.5s"
  security:
    - "Passwords hashed with bcrypt"
    - "CSRF protection via NextAuth"
    - "Server-side input validation"
  accessibility: "WCAG 2.1 AA"

deployment:
  platform: "vercel"
  ci_cd: "github-actions"

conventions:
  naming:
    files: "kebab-case"
    functions: "camelCase"
    components: "PascalCase"
    variables: "camelCase"
  git:
    branch_strategy: "github-flow"
    commit_format: "conventional-commits"
  code_style: "biome default"

context:
  inspiration: "TodoMVC, Things 3"
  notes: |
    Keep the UI simple and clean.
    Focus on reliability and speed.
