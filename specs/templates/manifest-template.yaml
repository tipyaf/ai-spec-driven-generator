# IMPLEMENTATION MANIFEST
# ========================
# Created by developer during /build, BEFORE writing any code.
#
# Two-phase process:
#   Phase 1 (skeleton): Developer fills scope, artifacts, ac_verifications, anti_patterns
#   Phase 2 (complete): Developer reads codebase, adds files_to_read/modify/create
#
# Consumers:
#   - Validator: verifies declared artifacts exist in code (spec contract)
#   - Reviewer: verifies git diff matches declared file scope (scope enforcement)
#
# Location: specs/stories/[feature-id]-manifest.yaml

manifest:
  feature_id: ""              # e.g. "auth-login"
  story_file: ""              # e.g. "specs/stories/auth-login.yaml"
  phase: "skeleton"           # skeleton | complete — MUST be "complete" before coding starts
  created_at: ""              # ISO date

scope:
  artifacts:
    endpoints: []
      # - method: GET
      #   path: /api/v1/users/{id}
      #   auth: true
      #   response_model: UserResponse
      #   status_code: 200

    migrations: []
      # - table: users
      #   operation: create       # create | alter | drop

    components: []
      # - name: UserProfile
      #   file: src/components/UserProfile.tsx
      #   status: new             # new | modified

    services: []
      # - name: UserService
      #   file: src/services/user.service.ts
      #   status: new             # new | modified

  ac_verifications: []
    # Copied verbatim from story file verify: commands
    # - id: "AC-FUNC-AUTH-01"
    #   verify: "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/login"

  anti_patterns: []
    # From stack profile forbidden_patterns — checked by validator
    # - pattern: 'mock\('
    #   scope: "tests/integration/"
    #   message: "Integration tests must not mock the DB"

files:
  files_to_read: []           # Existing files to read for context (Phase 2)
  files_to_modify: []         # Existing files that will be changed (Phase 2)
  files_to_create: []         # New files that will be created (Phase 2)

pipeline_steps: []
  # Filled during build — each step marked done as completed
  # - step: "data-model"
  #   status: "done"
  # - step: "business-logic"
  #   status: "done"
  # - step: "api-endpoints"
  #   status: "done"
  # - step: "tests"
  #   status: "done"
  # - step: "quality-gate"
  #   status: "done"

deployment_note: ""           # e.g. "Rebuild: api, frontend. Run: docker compose up -d --build api frontend"

# ========================
# BUILD STATE — Gate results
# ========================
# Written by validator, reviewer, security, tester agents during /validate and /review.
# Persists between sessions — agents resume from last known state.
# Each gate: pending → pass | fail | skip | escalated

gates:
  validation:
    status: pending            # pending | pass | fail | escalated
    cycle: 0                   # incremented on each attempt
    passed: []                 # AC IDs that passed
    failed: []                 # [{id, criterion, evidence}]
    not_verifiable: []         # AC IDs that are runtime-only (Tier 3)
    validated_at: ""           # ISO date of last run

  code_review:
    status: pending            # pending | pass | fail
    pass_1: pending            # KISS & readability
    pass_2: pending            # Static analysis (automated)
    pass_3: pending            # Safety & correctness
    findings: []               # [{file, line, rule, severity, text}] — only on fail
    reviewed_at: ""

  security_audit:
    status: pending            # pending | pass | fail | skip
    risk_level: ""             # CRITICAL | HIGH | MEDIUM | LOW | PASS
    critical: []               # [{file, line, description, remediation}]
    high: []
    medium: []
    low: []
    audited_at: ""

  test_quality:
    status: pending            # pending | pass | fail
    mutation_score: 0          # percentage (0-100)
    mutation_cycle: 0
    survivors: []              # [{file, line, original, mutated}] — only on fail
    ensemble:
      strong: 0
      weak: 0
      useless: 0
      useless_tests: []        # function names that must be rewritten
    fault_scenarios_generated: 0
    tested_at: ""

  scope_check:
    status: pending            # pending | pass | fail
    undeclared_files: []       # files in git diff not in manifest
    missing_artifacts: []      # declared artifacts not found in code
    checked_at: ""

notes: ""                     # Developer notes, decisions, trade-offs
