# Build file template — created by orchestrator for each story
# Location: _work/build/sc-[ID].yaml
#
# This file tracks the pipeline state for a single story.
# Each gate must pass before the story can move to Done.

story: sc-[ID]
cycle: 1
dispatched_at: YYYY-MM-DD
agent: developer  # or builder-service, builder-frontend, builder-infra, builder-migration

files:
  created: []
  modified: []
  deleted: []

ac_verifications: []    # Copied from spec overlay
anti_patterns: []       # From stack profile
domain_context: {}      # Slice of baseline for this story's service/tables
test_patterns: []       # From stack profile
lessons: []             # Applicable entries from LESSONS.md

dependency_map:
  # Generated by /build before RED phase dispatch.
  # Source: grep-based analysis of story scope files vs existing codebase.
  # Purpose: tells test-engineer which existing tests to verify (TDAD — reduces regressions by 70%).
  touched_functions: []
    # - file: ""              # Existing production file containing the symbol
    #   symbol: ""            # Function/class/method name
    #   reason: ""            # Why it is touched (called by scope file, modified in scope)
  existing_tests: []
    # - file: ""              # Test file path
    #   covers: []            # List of symbols this test file exercises
    #   run_command: ""       # Exact shell command to run this test file only
  connected_components: []
    # - file: ""              # Production file outside story scope
    #   depends_on: ""        # Scope file it imports from
    #   reason: ""            # What it uses (import, interface dependency)

# ─── RED phase (TDD — test-engineer writes failing tests) ─────────────────────
red_phase:
  status: pending       # pending | in_progress | validated
  tdd_red:
    status: pending     # pending | done | fail
    commit: null
    test_count: 0
    failing: 0
  quality_scan:
    status: pending     # pending | pass | fail | skipped (skipped if no quality tool configured)
    tool: null          # sonarqube | other | null
    findings: []
  review:
    status: pending     # pending | pass | fail
    findings: []

# ─── GREEN phase (builder makes tests pass) ──────────────────────────────────
green_phase:
  status: pending       # pending | in_progress | done
  tdd_green:
    status: pending     # pending | pass | fail
    commit: null
    tampering: []
  compilation:
    status: pending     # pending | pass | fail
    command: null       # compilation command from stack profile

# ─── Validation gates (11 sequential — ALL must pass) ────────────────────────
# Gates 4-7 are skipped for non-UI projects.
# Gate 3 (code_quality) is NEVER skipped — if no tool is configured, the reviewer
# agent takes over with its 3-pass quality review (KISS, static, safety).
gates:
  security:
    status: pending     # pending | pass | fail
    critical: 0
    high: 0
    medium: 0
    low: 0
  unit_tests:
    status: pending     # pending | pass | fail
    pass_count: 0
    fail_count: 0
  code_quality:
    status: pending     # pending | pass | fail (NEVER skipped)
    method: null        # tool (sonarqube/other) | reviewer (fallback)
    blocker: 0
    critical: 0
    major: 0
    coverage_pct: null
    code_review_pass_1: null   # KISS & readability (when method=reviewer)
    code_review_pass_2: null   # Static analysis (when method=reviewer)
    code_review_pass_3: null   # Safety & correctness (when method=reviewer)
    findings: []
  e2e_code:
    status: pending     # pending | pass | fail | skipped (non-UI projects)
  wcag_wireframes:
    status: pending     # pending | pass | fail | skipped (non-UI projects)
    wcag_violations: 0
    wireframe_conformity: null  # pass | fail | null
  e2e_execution:
    status: pending     # pending | pass | fail | skipped (non-UI projects)
    pass_count: 0
    fail_count: 0
  e2e_wireframe_validation:
    status: pending     # pending | pass | fail | skipped (non-UI projects)
  ac_validation:
    status: pending     # pending | pass | fail
    cycle: 0
    passed: []
    failed: []
    not_verifiable: []
  story_review:
    status: pending     # pending | pass | fail
    findings: []
  code_review:
    status: pending     # pending | pass | fail
    console_errors: 0   # must be 0 to pass
    pass_1: null        # KISS & readability
    pass_2: null        # Static analysis (automated)
    pass_3: null        # Safety & correctness
    findings: []
  final_compilation:
    status: pending     # pending | pass | fail
    command: null       # same as green_phase.compilation.command
