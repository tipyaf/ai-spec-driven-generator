# ============================================================================
# SPEC TEMPLATE - AI Project Generation Framework
# ============================================================================
# This template is project-type agnostic. Sections are marked with which
# project types they apply to. Include only the sections relevant to your
# project type and delete the rest.
#
# Project types:
#   web-app        — Browser-based application (SPA, SSR, static site)
#   api            — Backend service exposing an API
#   cli            — Command-line tool
#   mobile         — Native or cross-platform mobile app
#   desktop        — Desktop application (Electron, Tauri, Qt, etc.)
#   library        — Reusable package/SDK published to a registry
#   embedded       — Firmware or IoT software for constrained hardware
#   data-pipeline  — ETL, batch processing, or streaming data system
#   fullstack      — Combined frontend + backend (e.g., Next.js, Rails)
#   monorepo       — Multi-package repository with multiple deliverables
# ============================================================================


# ============================================================================
# METADATA
# Applies to: ALL project types
# ============================================================================

project:
  name: ""                          # Project name (kebab-case)
  description: ""                   # Short description (1-2 sentences)
  type: ""                          # web-app | api | cli | mobile | desktop | library | embedded | data-pipeline | fullstack | monorepo
  language: ""                      # typescript | python | go | rust | java | c | cpp | swift | kotlin | dart | etc.
  version: "0.1.0"


# ============================================================================
# PROBLEM & GOALS
# Applies to: ALL project types
# ============================================================================

problem_statement: ""               # What problem does this project solve?
target_users: ""                    # Who are the users? (developers, end-users, devices, systems)
success_metrics:                    # How do we know the project succeeded?
  - ""


# ============================================================================
# TECH STACK
# Applies to: ALL project types
# Include only the fields relevant to your project type.
# ============================================================================

stack:
  # --- Universal ---
  runtime: ""                       # node | bun | deno | python | go | dotnet | jvm | native | etc.
  framework: ""                     # nextjs | express | fastapi | gin | clap | flutter | react-native | electron | tauri | qt | etc.
  package_manager: ""               # npm | pnpm | bun | yarn | pip | uv | cargo | go | maven | gradle | etc.
  testing: ""                       # vitest | jest | pytest | go-test | cargo-test | junit | xctest | etc.
  linting: ""                       # eslint | biome | ruff | clippy | golangci-lint | none

  # --- Data layer (web-app, api, fullstack, data-pipeline) ---
  database: ""                      # postgres | mysql | sqlite | mongodb | redis | none
  orm: ""                           # prisma | drizzle | sqlalchemy | gorm | diesel | none

  # --- Auth (web-app, api, mobile, fullstack) ---
  auth: ""                          # nextauth | clerk | firebase-auth | custom | none

  # --- UI (web-app, mobile, desktop, fullstack) ---
  styling: ""                       # tailwind | css-modules | styled-components | material-ui | none
  ui_toolkit: ""                    # shadcn | radix | flutter-widgets | swiftui | jetpack-compose | qt-widgets | none

  # --- Embedded ---
  toolchain: ""                     # gcc-arm | esp-idf | platformio | arduino | zephyr | none
  rtos: ""                          # freertos | zephyr-rtos | none | bare-metal

  # --- Data pipeline ---
  orchestrator: ""                  # airflow | dagster | prefect | temporal | cron | none
  message_broker: ""                # kafka | rabbitmq | sqs | redis-streams | none


# ============================================================================
# ARCHITECTURE
# Applies to: ALL project types
# ============================================================================

architecture:
  pattern: ""                       # mvc | clean-architecture | hexagonal | layered | modular | event-driven | microservices | serverless
  directory_structure: |            # Desired folder structure (leave empty to use framework convention)
  monorepo: false                   # true if monorepo (turborepo, nx, cargo workspaces, etc.)
  monorepo_tool: ""                 # turborepo | nx | lerna | cargo-workspaces | go-workspaces | none


# ============================================================================
# FEATURES
# Applies to: ALL project types
# Each feature includes acceptance criteria and machine-verifiable tests.
# Use only the test types relevant to your project type.
# ============================================================================

features:
  - name: ""                        # Feature name
    description: ""                 # What the feature does
    priority: ""                    # must-have | should-have | nice-to-have

    # ------------------------------------------------------------------
    # ACCEPTANCE CRITERIA
    # Structured format with unique IDs and machine-verifiable commands.
    # During /spec (PO phase), write functional ACs only.
    # During /refine, AC-SEC-* and AC-BP-* are auto-generated from stack profiles.
    #
    # Format: AC-[TYPE]-[FEATURE]-[NUMBER]
    # Types: FUNC (functional), SEC (security), BP (best practice)
    #
    # EVERY AC MUST have a `verify:` field with a runnable shell command.
    # Testability tiers:
    #   Tier 1 (preferred): grep/bash — runs without live service
    #   Tier 2: curl/playwright — requires live service
    #   Tier 3 (last resort): runtime-only — minimize usage
    # Rules:
    #   - `verify: static` is BANNED — rewrite until you have a command
    #   - AC-SEC-* MUST be Tier 1
    #   - No AC without verify:
    # ------------------------------------------------------------------
    acceptance_criteria:
      - id: ""                      # e.g., AC-FUNC-AUTH-01
        type: ""                    # FUNC | SEC | BP
        description: ""             # Given [precondition] / When [action] / Then [result]
        verify: ""                  # Shell command: grep, bash, curl, or playwright
        tier: 1                     # 1 | 2 | 3


# ============================================================================
# UI DEFINITION
# Applies to: web-app, mobile, desktop, fullstack
# Skip for: api, cli, library, embedded, data-pipeline
# ============================================================================

ui:
  design_system:
    colors:                         # Brand colors with contrast ratios for WCAG AA
      primary: ""
      secondary: ""
      background: ""
      text: ""
      error: ""
      success: ""
    typography:
      font_family: ""
      headings: ""                  # e.g., "Inter Bold 24/20/16px"
      body: ""                      # e.g., "Inter Regular 14px"
    spacing: ""                     # e.g., "4px base unit"
    border_radius: ""               # e.g., "8px"

  components:                       # Reusable UI components
    - name: ""
      description: ""
      states:                       # Component states to implement
        - default
        - hover
        - loading
        - error
        - empty
        - disabled

  # Web: pages, Mobile: screens, Desktop: windows
  pages:
    - name: ""
      route: ""                     # URL path (web) | screen name (mobile) | window ID (desktop)
      layout: ""                    # Layout description
      components: []                # Components used on this page


# ============================================================================
# API DEFINITION
# Applies to: api, web-app (with backend), fullstack
# Skip for: cli, library, embedded, desktop, data-pipeline
#   (unless they expose an API — include this section if they do)
# ============================================================================

api:
  protocol: ""                      # REST | GraphQL | gRPC | WebSocket | tRPC
  base_url: ""                      # e.g., /api/v1
  authentication: ""                # JWT | OAuth2 | API-key | session | none

  endpoints:
    - method: ""                    # GET | POST | PUT | DELETE | PATCH
      path: ""
      description: ""
      request_body: ""              # JSON schema or description
      response: ""                  # JSON schema or description
      auth_required: true


# ============================================================================
# CLI DEFINITION
# Applies to: cli
# Skip for: all other types
# ============================================================================

cli:
  binary_name: ""                   # Name of the compiled binary or script
  global_flags:                     # Flags available on all commands
    - name: ""
      short: ""                     # Single-letter alias (e.g., "v" for --verbose)
      description: ""
      default: ""

  commands:
    - name: ""                      # Command name (e.g., "init", "build", "run")
      description: ""
      arguments:                    # Positional arguments
        - name: ""
          required: true
          description: ""
      flags:                        # Command-specific flags
        - name: ""
          short: ""
          description: ""
          default: ""
      example: ""                   # Usage example (e.g., "mycli init --template react")
      expected_output: ""           # What the user should see


# ============================================================================
# LIBRARY / SDK DEFINITION
# Applies to: library
# Skip for: all other types
# ============================================================================

library:
  package_name: ""                  # Published package name (e.g., "@scope/package")
  distribution: ""                  # npm | PyPI | crates.io | Maven | NuGet | pub.dev | hex | etc.
  min_language_version: ""          # Minimum supported language version

  public_api:                       # Exported functions, classes, types
    - name: ""                      # Function, class, or type name
      kind: ""                      # function | class | type | constant | module
      signature: ""                 # Full type signature
      description: ""
      example: ""                   # Usage example

  peer_dependencies: []             # Required peer/companion packages
  tree_shakeable: false             # Whether unused exports can be eliminated


# ============================================================================
# EMBEDDED / IoT DEFINITION
# Applies to: embedded
# Skip for: all other types
# ============================================================================

embedded:
  target_hardware: ""               # e.g., ESP32, STM32F4, Raspberry Pi Pico, Arduino Mega
  architecture: ""                  # ARM Cortex-M4, RISC-V, AVR, Xtensa, etc.

  interfaces:
    - type: ""                      # GPIO | I2C | SPI | UART | USB | ADC | PWM | CAN | BLE | WiFi
      description: ""
      pins: ""                      # Pin assignments (e.g., "GPIO 21 = SDA, GPIO 22 = SCL")

  constraints:
    flash: ""                       # e.g., 512KB
    ram: ""                         # e.g., 256KB
    clock: ""                       # e.g., 240MHz
    power: ""                       # e.g., "battery-operated, target < 50mA active"
    real_time: false                # Hard real-time constraints?
    max_latency: ""                 # e.g., "10ms interrupt response"

  peripherals:                      # External hardware components
    - name: ""                      # e.g., "BME280 sensor", "SSD1306 OLED"
      interface: ""                 # How it connects (I2C, SPI, etc.)
      driver: ""                    # Library or custom driver


# ============================================================================
# DATA PIPELINE DEFINITION
# Applies to: data-pipeline
# Skip for: all other types
# ============================================================================

pipeline:
  sources:                          # Input data sources
    - name: ""
      type: ""                      # database | api | file | stream | queue
      format: ""                    # csv | json | parquet | avro | protobuf
      location: ""                  # Connection string, URL, or file path

  transformations:                  # Processing steps in order
    - name: ""
      description: ""
      input: ""                     # Source or previous transformation
      output: ""                    # Output dataset name
      logic: ""                     # Transformation description

  sinks:                            # Output destinations
    - name: ""
      type: ""                      # database | file | api | warehouse | lake
      format: ""
      location: ""

  schedule: ""                      # Cron expression, event trigger, or "real-time"
  volume: ""                        # Expected data volume (e.g., "10M rows/day", "500GB/month")
  idempotent: false                 # Can the pipeline be safely re-run?
  backfill_strategy: ""             # How to handle historical data reprocessing


# ============================================================================
# DATA MODEL
# Applies to: web-app, api, fullstack, mobile, data-pipeline
# Skip for: cli, library, embedded, desktop (unless they persist data)
# ============================================================================

data_model:
  entities:
    - name: ""                      # Entity name (PascalCase)
      fields:
        - name: ""                  # Field name
          type: ""                  # string | number | boolean | date | json | relation | enum
          required: true
          unique: false
          description: ""
      relations:
        - type: ""                  # one-to-one | one-to-many | many-to-many
          target: ""                # Target entity name
          field: ""                 # Relation field name


# ============================================================================
# NON-FUNCTIONAL REQUIREMENTS
# Applies to: ALL project types
# Include only the subsections relevant to your project type.
# ============================================================================

non_functional:
  # --- Universal ---
  performance:
    - ""                            # e.g., "API response < 200ms", "CLI startup < 100ms", "Boot time < 2s"
  security:
    - ""                            # e.g., "Input sanitization", "No secrets in source", "Encrypted at rest"
  monitoring:
    - ""                            # e.g., "Structured logging", "Error tracking", "Health check endpoint"

  # --- Web / Mobile / Desktop (UI projects) ---
  # Skip for: api, cli, library, embedded, data-pipeline
  accessibility: ""                 # e.g., "WCAG 2.1 AA"
  browser_support:                  # Web only
    - ""                            # e.g., "Chrome, Firefox, Safari, Edge (latest 2 versions)"
  device_support:                   # Mobile only
    - ""                            # e.g., "iOS 16+, Android 12+"
  responsive: false                 # Web / mobile: responsive design required?
  offline_support: false            # Mobile / desktop / embedded: works offline?

  # --- API ---
  # Skip for: cli, library, embedded, desktop, data-pipeline
  rate_limiting: ""                 # e.g., "100 req/min per API key"
  versioning: ""                    # e.g., "URL-based /v1/, /v2/"
  documentation: ""                 # e.g., "OpenAPI 3.0 auto-generated"

  # --- Library ---
  # Skip for: all other types
  bundle_size: ""                   # e.g., "< 10KB gzipped"
  backward_compatibility: ""        # e.g., "Semver, no breaking changes in minor"

  # --- Embedded ---
  # Skip for: all other types
  power_consumption: ""             # e.g., "< 50mA active, < 10uA deep sleep"
  memory_budget: ""                 # e.g., "< 200KB flash, < 64KB RAM"
  operating_temperature: ""         # e.g., "-20C to 60C"

  # --- Data pipeline ---
  # Skip for: all other types
  data_freshness: ""                # e.g., "< 5 min latency from source to sink"
  data_quality: ""                  # e.g., "< 0.1% null rate on required fields"
  recovery: ""                      # e.g., "Automatic retry with dead-letter queue"


# ============================================================================
# DEPLOYMENT
# Applies to: ALL project types
# ============================================================================

deployment:
  platform: ""                      # vercel | aws | gcp | azure | docker | fly.io | railway | bare-metal | app-stores | package-registry | firmware-ota
  environments:                     # Deployment environments
    - name: ""                      # dev | staging | production
      url: ""                       # URL or identifier
  ci_cd: ""                         # github-actions | gitlab-ci | circleci | jenkins | none
  containerized: false              # Docker-based deployment?
  infrastructure_as_code: ""        # terraform | pulumi | cdk | none


# ============================================================================
# CONVENTIONS
# Applies to: ALL project types
# ============================================================================

conventions:
  naming:
    files: ""                       # kebab-case | camelCase | PascalCase | snake_case
    functions: ""                   # camelCase | snake_case | PascalCase
    components: ""                  # PascalCase (UI projects only)
    variables: ""                   # camelCase | snake_case | SCREAMING_SNAKE_CASE (constants)
    types: ""                       # PascalCase (typed languages)
  git:
    branch_strategy: ""             # gitflow | trunk-based | github-flow
    commit_format: ""               # conventional-commits | free-form
  code_style: ""                    # Reference to preset or description (e.g., "Airbnb", "Google", "PEP 8")
  documentation: ""                 # JSDoc | docstrings | rustdoc | godoc | none


# ============================================================================
# ADDITIONAL CONTEXT
# Applies to: ALL project types
# ============================================================================

context:
  inspiration: ""                   # Similar projects or sources of inspiration
  existing_code: ""                 # Path to existing code to integrate
  documentation: ""                 # Links to relevant documentation
  wireframes: []                    # Paths to wireframe images (UI projects)
  hardware_schematics: []           # Paths to schematics (embedded projects)
  notes: |                          # Free notes for the AI
    # Add any additional context here
