# Project Specification
# Generated by Story Refiner -- update this file during every refinement pass
#
# Usage:
#   Copy this file to _docs/spec.yaml in your project.
#   Fill in the meta section first, then add services, schemas, database tables,
#   frontend pages, and auth details as the project spec grows.
#
# This file is read by builder agents before writing code. Keep it accurate.

meta:
  project: ""
  version: "1.0.0"
  last_updated: ""
  stack:
    backend: ""          # e.g. "Python 3.11 / FastAPI / SQLAlchemy"
    frontend: ""         # e.g. "TypeScript / React 18 / Vite"
    database: ""         # e.g. "PostgreSQL 16 / TimescaleDB"
    cache: ""            # e.g. "Redis 7"
    infra: ""            # e.g. "Docker Compose / GitHub Actions / Traefik"

# ---------------------------------------------------------------------------
# Services
# List every backend service (or microservice). For a monolith, one entry.
# ---------------------------------------------------------------------------
services:
  - name: ""
    description: ""
    port: null
    endpoints:
      - method: ""       # GET POST PUT DELETE PATCH
        path: ""
        auth: true       # true = requires auth token / cookie
        request_schema: ""
        response_schema: ""
        status_code: 200
        description: ""

# ---------------------------------------------------------------------------
# Schemas
# Pydantic models (backend) or TypeScript interfaces (frontend).
# Document both request and response schemas here for cross-agent visibility.
# ---------------------------------------------------------------------------
schemas:
  - name: ""             # Pydantic model / TypeScript interface name
    fields:
      - name: ""
        type: ""
        required: true
        description: ""

# ---------------------------------------------------------------------------
# Database
# Table definitions -- mirrors what Alembic migrations implement.
# Always update when a new migration is added.
# ---------------------------------------------------------------------------
database:
  tables:
    - name: ""
      schema: ""         # e.g. "auth", "trading"
      columns:
        - name: ""
          type: ""
          nullable: false
          default: null
          description: ""
      indexes: []        # e.g. ["user_id", "created_at DESC"]
      constraints: []    # e.g. ["status IN ('active', 'inactive')"]

# ---------------------------------------------------------------------------
# Frontend
# Pages and their API dependencies.
# UX specs live in _work/ux/<feature>-ux-spec.md -- reference them here.
# ---------------------------------------------------------------------------
frontend:
  pages:
    - name: ""
      route: ""
      auth_required: true
      ux_spec: ""        # e.g. "_work/ux/feature-name-ux-spec.md"
      components: []     # component names used on this page
      api_calls: []      # API endpoints this page calls (e.g. "GET /api/v1/features")

# ---------------------------------------------------------------------------
# Auth
# Authentication mechanism and token lifecycle.
# ---------------------------------------------------------------------------
auth:
  mechanism: ""          # e.g. "JWT / HttpOnly cookie"
  token_lifetime: ""     # e.g. "15 minutes"
  refresh: true
  refresh_lifetime: ""   # e.g. "7 days"
  mfa: false             # true if TOTP or similar is required

# ---------------------------------------------------------------------------
# Quality
# Test targets and toolchain commands.
# ---------------------------------------------------------------------------
quality:
  coverage_target: 80    # minimum test coverage percentage
  lint: []               # e.g. ["ruff check .", "eslint src/"]
  type_check: []         # e.g. ["mypy app/", "tsc --noEmit"]
  test_command: ""       # e.g. "pytest tests/"
  integration_test_command: ""  # e.g. "pytest tests/integration/"
